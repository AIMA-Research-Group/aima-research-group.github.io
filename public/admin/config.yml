local_backend: true
backend:
  name: github
  repo: aima-research-group/aima-research-group.github.io
  branch: main
  base_url: https://aima-decap-auth.chungtiendat8102000.workers.dev
  auth_endpoint: /auth
media_folder: public/uploads
public_folder: /uploads
collections:
  - name: site_settings
    label: Site Settings
    files:
      - label: Site
        name: site
        file: content/settings/site.yml
        fields:
          - { label: Site Name, name: site_name, widget: string }
          - { label: Short Name, name: short_name, widget: string }
          - { label: Subtitle, name: subtitle, widget: string }
          - { label: Tagline, name: tagline, widget: string }
          - { label: Description, name: description, widget: text }
          - { label: Full Logo, name: logo_full, widget: image }
          - { label: Symbol Logo, name: logo_symbol, widget: image }
          - { label: Favicon, name: favicon, widget: image }
          - { label: Default OG Image, name: default_og_image, widget: image }
          - { label: Email, name: email, widget: string }
          - { label: Location, name: location, widget: string }
          - { label: Domain, name: domain, widget: string }
          - { label: Google Form URL, name: google_form_url, widget: string }
      - label: SEO
        name: seo
        file: content/settings/seo.yml
        fields:
          - { label: Default Title, name: default_title, widget: string }
          - { label: Default Description, name: default_description, widget: text }
          - { label: Canonical Domain, name: canonical_domain, widget: string }
      - label: Affiliation Registry
        name: affiliation_registry
        file: content/settings/affiliations.yml
        fields:
          - label: Affiliations
            name: affiliations
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Slug, name: slug, widget: string }
              - { label: Logo, name: logo, widget: image, required: false }
              - { label: URL, name: url, widget: string, required: false }
              - { label: Location, name: location, widget: string }
      - label: Official Affiliations
        name: official_affiliations
        file: content/affiliation/official-affiliations.yml
        fields:
          - label: Official Affiliations
            name: official_affiliations
            widget: list
            fields:
              - { label: Slug, name: slug, widget: string }
              - { label: Order, name: order, widget: number }
  - name: navigation
    label: Navigation
    files:
      - label: Navigation
        name: navigation_settings
        file: content/settings/navigation.yml
        fields:
          - label: Items
            name: items
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Href, name: href, widget: string }
              - { label: Order, name: order, widget: number }
              - { label: Visible, name: visible, widget: boolean }
              - { label: External, name: external, widget: boolean }
              - { label: Group, name: group, widget: string }
  - name: homepage
    label: Homepage Settings
    files:
      - label: Homepage Settings
        name: homepage_settings
        file: content/settings/homepage.yml
        fields:
          - { label: Hero Eyebrow, name: hero_eyebrow, widget: string }
          - { label: Hero Title, name: hero_title, widget: string }
          - { label: Hero Description, name: hero_description, widget: text }
          - { label: Vision Title, name: vision_title, widget: string }
          - { label: Vision Description, name: vision_description, widget: text }
  - name: research_themes
    label: Research Themes
    folder: content/research-themes
    extension: yml
    create: true
    fields: &standard
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Order, name: order, widget: number }
      - { label: Featured, name: featured, widget: boolean }
      - { label: Summary, name: summary, widget: text }
  - name: publications
    label: Publications
    folder: content/publications
    extension: yml
    create: true
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Year, name: year, widget: number }
      - { label: Authors, name: authors, widget: string, hint: "Use one line, separated by commas." }
      - { label: Venue, name: venue, widget: string }
      - label: Publication Type
        name: publication_type
        widget: select
        options: [journal, conference, preprint, workshop, poster, thesis, other]
      - { label: Impact Factor, name: impact_factor, widget: string, required: false }
      - label: Badges
        name: badges
        widget: select
        multiple: true
        required: false
        options: [Oral, Highlight, Best Paper Award]
      - { label: Thumbnail, name: thumbnail, widget: image, required: false }
      - { label: Figure, name: figure, widget: image, required: false }
      - { label: Media Type, name: media_type, widget: select, options: [image, gif, none], default: none }
      - { label: Research Theme Slugs, name: research_theme_slugs, widget: list, required: false, field: { label: Slug, name: slug, widget: string } }
      - { label: Related Project Slugs, name: related_project_slugs, widget: list, required: false, field: { label: Slug, name: slug, widget: string } }
      - label: Links
        name: links
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
      - { label: Featured, name: featured, widget: boolean, default: false }
      - { label: Order, name: order, widget: number, required: false }
      - { label: Status, name: status, widget: string }
      - { label: Placeholder, name: placeholder, widget: boolean, default: false }
  - name: news
    label: News
    folder: content/news
    extension: yml
    create: true
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Date, name: date, widget: datetime, date_format: YYYY-MM-DD, time_format: false, format: YYYY-MM-DD }
      - label: Category
        name: category
        widget: select
        options: [paper, member, conference, talk, award, lab, other]
      - { label: Summary, name: summary, widget: text }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Link Label, name: link_label, widget: string, required: false }
      - { label: Link URL, name: link_url, widget: string, required: false }
      - { label: Order, name: order, widget: number }
      - { label: Featured, name: featured, widget: boolean, default: true }
      - { label: Pinned, name: pinned, widget: boolean, default: false }
      - { label: Placeholder, name: placeholder, widget: boolean, default: false }
  - { name: projects, label: Projects, folder: content/projects, extension: yml, create: true, fields: *standard }
  - name: people
    label: People
    folder: content/people
    extension: yml
    create: true
    fields:
      - { label: Name, name: name, widget: string }
      - { label: Slug, name: slug, widget: string }
      - { label: Order, name: order, widget: number }
      - { label: Featured, name: featured, widget: boolean }
      - label: Group
        name: group
        widget: select
        options: [founder, leader, mentor, core-member, collaborator, affiliated-faculty]
      - { label: Role, name: role, widget: string }
      - { label: Affiliation, name: affiliation, widget: string }
      - label: Affiliation Slugs
        name: affiliation_slugs
        widget: list
        required: false
        field: { label: Slug, name: slug, widget: string }
      - { label: Short Bio, name: short_bio, widget: text }
      - { label: Full Bio, name: full_bio, widget: text }
      - label: Research Interests
        name: research_interests
        widget: list
        field: { label: Interest, name: interest, widget: string }
      - { label: Photo, name: photo, widget: image, required: false }
      - label: Links
        name: links
        widget: list
        required: false
        fields:
          - { label: Label, name: label, widget: string }
          - { label: URL, name: url, widget: string }
      - { label: Active, name: active, widget: boolean }
      - { label: Placeholder, name: placeholder, widget: boolean }
  - { name: community, label: Community Narratives, folder: content/community, extension: yml, create: true, fields: *standard }
  - { name: gallery, label: Gallery Images, folder: content/gallery, extension: yml, create: true, fields: *standard }
  - { name: opportunities, label: Opportunities, folder: content/opportunities, extension: yml, create: true, fields: *standard }
  - { name: pages, label: Long-form Pages, folder: content/pages, extension: md, create: true, fields: [{ label: Title, name: title, widget: string }, { label: Slug, name: slug, widget: string }, { label: Body, name: body, widget: markdown }] }
