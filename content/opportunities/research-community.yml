audience: student
summary: Join AIMA as a motivated researcher-in-training interested in rigorous AI research.
description: |
  If you are a Vietnamese undergraduate or master's student, or an AIO member, and are interested in working on my research topics under my mentorship, you may want to check out the open positions in the AIMA group.

  **For AIO 2025 students only:** Please fill the form to register for participating in AIO 2025 AIMA Research Mentorship Program.

  **Application Deadline:** January 28th, 2026 (hard deadline)
  **Interview Period:** January 29th to February 1st

  About project information, please find projects' description below.
expectations:
  - Read research papers carefully and discuss them with precision.
  - Commit to reproducible experiments and honest reporting.
  - Participate in critique, writing, and project iteration.
learning_outcomes:
  - Formulate stronger research questions.
  - Build research-ready experiments and evaluation plans.
  - Understand the publication journey from idea to submission.
application_process: |
  For questions, contact: aima.research.aivn@gmail.com or thanhhun@andrew.cmu.edu (by Thanh-Huy Nguyen)
