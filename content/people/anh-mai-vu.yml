short_bio: AIMA Mentor working on computational pathology and trustworthy medical AI, with interests in interpretable evidence-based models and world models for medical imaging.
full_bio: >
  Mai Anh's research focuses on computational pathology and trustworthy medical AI. She develops evidence-based models that connect predictions with interpretable visual evidence in pathology images, using weak supervision, prototype-based localization, and multimodal reasoning. Moving forward, she aims to explore world models for medical imaging to support more grounded reasoning about tissue structure, disease progression, and clinical evidence.
