short_bio: Physician-scientist and Postdoctoral Associate at Yale School of Medicine working on clinically deployable AI for cardiovascular medicine and multimodal imaging.
full_bio: >
  Minh Le, MD, PhD, is a physician-scientist in cardiovascular medicine and a Postdoctoral Associate at Yale School of Medicine in the Department of Internal Medicine, Section of Cardiovascular Medicine. He graduated from the School of Medicine, University of Medicine and Pharmacy at Ho Chi Minh City, Vietnam, in 2018 and completed his PhD in Medicine at Taipei Medical University, Taiwan, in 2026. His research focuses on large language models, computer vision, machine learning, and deep learning, with applications in cardiology and multimodal imaging, including ECG, ultrasound, CT, MRI, and DSA. He is particularly interested in developing clinically deployable AI systems that improve diagnosis, risk stratification, and clinical decision support. Minh is a Harvard Medical School alumnus, having completed the Global Clinical Scholars Research Training Program in 2022. Before joining Yale, he spearheaded collaborative AI projects with institutions including Harvard Medical School, Johns Hopkins, and Carnegie Mellon University. His work has been published in leading journals and conferences including JAMA, EClinicalMedicine, IEEE JBHI, IEEE EMBS, ISBI, ICCV, and MICCAI. Outside of research, Minh enjoys photography, watching movies, and traveling.
